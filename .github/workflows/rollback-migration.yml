name: Rollback D1 Migration

on:
  workflow_dispatch:
    inputs:
      migration_number:
        description: 'Migration number to roll back (e.g., 0209)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: 'Type ROLLBACK to confirm'
        required: true
        type: string

concurrency:
  group: rollback-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Rollback Request
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          MIGRATION="${{ inputs.migration_number }}"
          if ! echo "$MIGRATION" | grep -qE '^[0-9]{4}$'; then
            echo "::error::Migration number must be exactly 4 digits (e.g., 0209). Got: $MIGRATION"
            exit 1
          fi
          if [ "${{ inputs.confirm }}" != "ROLLBACK" ]; then
            echo "::error::Confirmation failed. You must type 'ROLLBACK' to confirm."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Verify rollback script exists
        run: |
          MIGRATION="${{ inputs.migration_number }}"
          MATCHES=$(find infra/db/migrations -maxdepth 1 -name "${MIGRATION}_*.rollback.sql" -type f | wc -l)
          if [ "$MATCHES" -eq 0 ]; then
            echo "::error::No rollback script found for migration $MIGRATION"
            exit 1
          fi
          if [ "$MATCHES" -gt 1 ]; then
            echo "::error::Multiple rollback scripts match migration $MIGRATION — ambiguous"
            find infra/db/migrations -maxdepth 1 -name "${MIGRATION}_*.rollback.sql" -type f
            exit 1
          fi
          ROLLBACK_FILE=$(find infra/db/migrations -maxdepth 1 -name "${MIGRATION}_*.rollback.sql" -type f)
          echo "Found rollback script: $ROLLBACK_FILE"
          echo ""
          echo "SQL to execute:"
          cat "$ROLLBACK_FILE"

  rollback-staging:
    name: Rollback Migration (Staging)
    needs: validate
    if: inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Execute rollback SQL
        run: |
          MIGRATION="${{ inputs.migration_number }}"
          ROLLBACK_FILE=$(find infra/db/migrations -maxdepth 1 -name "${MIGRATION}_*.rollback.sql" -type f)
          echo "Executing rollback: $ROLLBACK_FILE"
          echo "Environment: staging"
          echo "---"
          cat "$ROLLBACK_FILE"
          echo "---"
          npx wrangler d1 execute webwaka-staging \
            --env staging \
            --remote \
            --file "$ROLLBACK_FILE" \
            --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify staging health
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.webwaka.com/health)
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Staging health check returned $STATUS after rollback"
          fi

  rollback-production:
    name: Rollback Migration (Production)
    needs: validate
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Execute rollback SQL
        run: |
          MIGRATION="${{ inputs.migration_number }}"
          ROLLBACK_FILE=$(find infra/db/migrations -maxdepth 1 -name "${MIGRATION}_*.rollback.sql" -type f)
          echo "Executing rollback: $ROLLBACK_FILE"
          echo "Environment: production"
          echo "---"
          cat "$ROLLBACK_FILE"
          echo "---"
          npx wrangler d1 execute webwaka-production \
            --env production \
            --remote \
            --file "$ROLLBACK_FILE" \
            --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify production health
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.webwaka.com/health)
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Production health check returned $STATUS after rollback"
            exit 1
          fi

  summary:
    name: Rollback Summary
    needs: [rollback-staging, rollback-production]
    if: always() && (needs.rollback-staging.result == 'success' || needs.rollback-production.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "## Migration Rollback Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Migration** | ${{ inputs.migration_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
