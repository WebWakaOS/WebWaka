name: Deploy — Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI checks ──────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ── D1 Migrations ──────────────────────────────────────────────────────────
  migrate-production:
    name: D1 Migrations (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Stage migrations for wrangler
        run: |
          if [ -d "infra/db/migrations" ] && ls infra/db/migrations/*.sql 1>/dev/null 2>&1; then
            mkdir -p apps/api/migrations
            cp infra/db/migrations/*.sql apps/api/migrations/
            echo "Staged $(ls apps/api/migrations/*.sql | wc -l) migration files"
          else
            echo "No migrations to stage"
          fi
      - name: Apply D1 migrations (production)
        run: |
          if ls apps/api/migrations/*.sql 1>/dev/null 2>&1; then
            npx wrangler d1 migrations apply webwaka-production \
              --env production \
              --remote \
              --config apps/api/wrangler.toml
          else
            echo "No migrations found — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Deploy apps ────────────────────────────────────────────────────────────
  deploy-api-production:
    name: Deploy API (Production)
    needs: migrate-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy API to Cloudflare Workers (production)
        run: |
          pnpm --filter api build
          npx wrangler deploy --env production --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Worker route (idempotent) ───────────────────────────────────────────────
  ensure-route-production:
    name: Ensure Production Route
    needs: deploy-api-production
    runs-on: ubuntu-latest
    steps:
      - name: Register api.webwaka.com Worker route
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/workers/routes" \
            -d '{"pattern":"api.webwaka.com/*","script":"webwaka-api-production"}' \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          # 10020 = route already exists — that's fine
          if d.get('success') or any(e.get('code')==10020 for e in d.get('errors',[])):
              print('Route OK')
          else:
              print('Route error:', d.get('errors'))
              exit(1)
          "
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  # ── Smoke tests ────────────────────────────────────────────────────────────
  smoke-test-production:
    name: Smoke Test (Production)
    needs: ensure-route-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run production smoke tests
        run: |
          if [ -f "tests/smoke/package.json" ]; then
            pnpm --filter smoke run smoke:production
          else
            echo "Smoke tests not yet implemented — skipping"
          fi
        env:
          SMOKE_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
