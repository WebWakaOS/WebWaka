      - run: pnpm install --frozen-lockfile
      - name: Apply HDX Health Facilities — North-Central & North-East (0492)
        continue-on-error: true
        run: |
          cd apps/api
          if npx wrangler d1 execute webwaka-production --env production --remote \
            --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0492_hdx_health_nc_ne_seed.sql'" \
            --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[0]['results'][0]['cnt']==0 else 1)" 2>/dev/null; then
            npx wrangler d1 execute webwaka-production --env production --remote \
              --file ../../infra/db/migrations/0492_hdx_health_nc_ne_seed.sql
