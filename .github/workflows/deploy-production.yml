name: Deploy — Production

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI checks ──────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # DEV-01: Staging validation gate — verify staging health before prod deploy
  validate-staging:
    name: Staging Validation Gate
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Check staging API health
        run: |
          STAGING_URL="${STAGING_BASE_URL:-https://api-staging.webwaka.com}"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Staging health check failed (HTTP $HTTP_STATUS)"
            echo "Production deploy blocked until staging is healthy."
            exit 1
          fi
          echo "Staging health check passed (HTTP 200)"
        env:
          STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}

  # ── D1 Migrations ──────────────────────────────────────────────────────────
  migrate-production:
    name: D1 Migrations (Production)
    needs: [ci, validate-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Stage migrations for wrangler
        run: |
          if [ -d "infra/db/migrations" ] && ls infra/db/migrations/*.sql 1>/dev/null 2>&1; then
            mkdir -p apps/api/migrations
            cp infra/db/migrations/*.sql apps/api/migrations/
            echo "Staged $(ls apps/api/migrations/*.sql | wc -l) migration files"
          else
            echo "No migrations to stage"
          fi
      - name: Apply D1 migrations (production)
        run: |
          if ls apps/api/migrations/*.sql 1>/dev/null 2>&1; then
            npx wrangler d1 migrations apply webwaka-production \
              --env production \
              --remote \
              --config apps/api/wrangler.toml
          else
            echo "No migrations found — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Deploy API ─────────────────────────────────────────────────────────────
  deploy-api-production:
    name: Deploy API (Production)
    needs: migrate-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy API to Cloudflare Workers (production)
        run: |
          npx wrangler deploy --env production --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Push secrets to production worker
        run: |
          echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET \
            --env production --config apps/api/wrangler.toml
          echo "$INTER_SERVICE_SECRET" | npx wrangler secret put INTER_SERVICE_SECRET \
            --env production --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTER_SERVICE_SECRET: ${{ secrets.INTER_SERVICE_SECRET }}

  # ── Smoke tests ────────────────────────────────────────────────────────────
  smoke-test-production:
    name: Smoke Test (Production)
    needs: deploy-api-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run production smoke tests
        run: |
          if [ -f "tests/smoke/package.json" ]; then
            pnpm --filter smoke run smoke:production
          else
            echo "Smoke tests not yet implemented — skipping"
          fi
        env:
          SMOKE_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
          SMOKE_TENANT_ID: ${{ vars.SMOKE_TENANT_ID }}
          SMOKE_API_KEY: ${{ secrets.SMOKE_API_KEY }}
