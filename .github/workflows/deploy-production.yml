            "0507_political_benue_assembly_full_roster_seed.sql"
            "0508_political_borno_assembly_full_roster_seed.sql"
            "0509_political_crossriver_assembly_full_roster_seed.sql"
            "0510_political_delta_assembly_full_roster_seed.sql"
            "0511_political_ebonyi_assembly_full_roster_seed.sql"
            "0512_political_edo_assembly_full_roster_seed.sql"
