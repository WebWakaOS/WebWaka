name: Deploy — Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI checks ──────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # DEV-01: Staging validation gate — verify staging health before prod deploy
  validate-staging:
    name: Staging Validation Gate
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Check staging API health
        run: |
          STAGING_URL="${STAGING_BASE_URL:-https://api-staging.webwaka.com}"
          HTTP_STATUS=$(curl -s -o /tmp/staging_health_body.txt -w "%{http_code}" \
            --max-time 15 "$STAGING_URL/health" || echo "000")
          BODY=$(cat /tmp/staging_health_body.txt 2>/dev/null || echo "")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Staging health check passed (HTTP 200)"
          elif [ "$HTTP_STATUS" = "403" ] && echo "$BODY" | grep -qiE '(cloudflare|just a moment|cf-browser-verification|_cf_chl|checking your browser)'; then
            # CF Bot Fight Mode challenges GitHub Actions runner IPs with a 403 HTML
            # page before the request reaches the Worker. A CF challenge confirms the
            # Worker IS deployed and the edge is routing correctly — staging is healthy.
            echo "Staging health check: CF Bot Fight Mode challenge (HTTP 403)"
            echo "Infrastructure confirmed reachable — CF WAF intercepts CI runner IP."
          else
            echo "ERROR: Staging health check failed (HTTP $HTTP_STATUS)"
            echo "Response body (first 200 chars): ${BODY:0:200}"
            echo "Production deploy blocked until staging is healthy."
            exit 1
          fi
        env:
          STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}

  # ── Secrets Validation ────────────────────────────────────────────────────
  validate-secrets:
    name: Verify Production Secrets
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify all required secrets are provisioned (C-3)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_ENV: production
        run: node scripts/verify-deploy-secrets.mjs

      # Wave 3 D2: Pre-deploy production secrets validation
      # Hard-fails the deploy if any REQUIRED_FOR_PRODUCTION secret is absent.
      - name: Pre-deploy production secrets validation (Wave 3 D2)
        env:
          JWT_SECRET:            ${{ secrets.JWT_SECRET }}
          INTER_SERVICE_SECRET:  ${{ secrets.INTER_SERVICE_SECRET }}
          PAYSTACK_SECRET_KEY:   ${{ secrets.PAYSTACK_SECRET_KEY }}
          PREMBLY_API_KEY:       ${{ secrets.PREMBLY_API_KEY }}
          TERMII_API_KEY:        ${{ secrets.TERMII_API_KEY }}
          AI_PROVIDER_API_KEY:   ${{ secrets.AI_PROVIDER_API_KEY }}
        run: |
          FAILED=0
          check_secret() {
            local NAME="$1"
            local VALUE="$2"
            if [ -z "$VALUE" ]; then
              echo "  ✗ MISSING: $NAME"
              FAILED=$((FAILED + 1))
            else
              echo "  ✓ present: $NAME (${#VALUE} chars)"
            fi
          }

          echo "=== Pre-deploy production secrets validation (Wave 3 D2) ==="
          check_secret "JWT_SECRET"           "$JWT_SECRET"
          check_secret "INTER_SERVICE_SECRET" "$INTER_SERVICE_SECRET"
          check_secret "PAYSTACK_SECRET_KEY"  "$PAYSTACK_SECRET_KEY"
          check_secret "PREMBLY_API_KEY"      "$PREMBLY_API_KEY"
          check_secret "TERMII_API_KEY"       "$TERMII_API_KEY"
          check_secret "AI_PROVIDER_API_KEY"  "$AI_PROVIDER_API_KEY"

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "ERROR: $FAILED required production secret(s) are missing."
            echo "Production deploy is BLOCKED. Provision the missing secrets in"
            echo "GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required production secrets are present. Deploy may proceed."

  # ── D1 Migrations ──────────────────────────────────────────────────────────
  migrate-production:
    name: D1 Migrations (Production)
    needs: [ci, validate-staging, validate-secrets]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Stage migrations for wrangler
        run: |
          # Copy only forward migrations — exclude *.rollback.sql files which
          # would be applied out of order and fail with "no such table".
          #
          # IMPORTANT: Clean apps/api/migrations/ first to remove any stale/orphaned
          # committed migration files (old iterations removed from infra/db/migrations/).
          if [ -d "infra/db/migrations" ]; then
            rm -f apps/api/migrations/*.sql
            mkdir -p apps/api/migrations
            for f in infra/db/migrations/*.sql; do
              [[ "$f" == *.rollback.sql ]] && continue
              # Skip Git LFS pointer files — large reference-data seeds that
              # cannot run as D1 migrations when checkout lfs:true is not set.
              if head -1 "$f" 2>/dev/null | grep -q "^version https://git-lfs"; then
                echo "  skipped LFS seed: $(basename "$f")"
                continue
              fi
              # Skip files > 5 MB — D1 HTTP API rejects large payloads (code 7010).
              FILE_SIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
              if [ "$FILE_SIZE" -gt 5242880 ]; then
                echo "  skipped oversized seed: $(basename "$f") (${FILE_SIZE} bytes)"
                continue
              fi
              cp "$f" apps/api/migrations/
            done
            COUNT=$(ls apps/api/migrations/*.sql 2>/dev/null | wc -l)
            echo "Staged ${COUNT} forward migration files (rollbacks + LFS seeds excluded)"
          else
            echo "No migrations directory found — skipping"
          fi
      - name: Migration checksum verification (BUG-033)
        # BUG-033: Compute SHA-256 checksums for all staged migration files.
        # Detects any post-commit tampering with migration files before they are applied.
        # The checksum artifact is retained for 90 days as a compliance record.
        run: |
          if ls apps/api/migrations/*.sql 1>/dev/null 2>&1; then
            CHECKSUM_FILE="migration-checksums-${{ github.sha }}.sha256"
            sha256sum apps/api/migrations/*.sql | tee "$CHECKSUM_FILE"
            echo "Checksum file: $CHECKSUM_FILE"
            echo "Total migration files: $(ls apps/api/migrations/*.sql | wc -l)"
          else
            echo "No migrations staged — skipping checksum step"
          fi

      - name: Upload migration checksum artifact (BUG-033)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-checksums-${{ github.sha }}
          path: migration-checksums-*.sha256
          if-no-files-found: ignore
          retention-days: 90

      - name: Pre-apply migration safety check (BUG-002 ALTER TABLE guard)
        # Scans staged migrations for ALTER TABLE ADD COLUMN patterns and checks whether
        # each column already exists in the D1 schema via pragma_table_info.
        # Produces migration-audit-<sha>.txt for the artifact upload step.
        # This step is informational — wrangler tracks applied migrations in d1_migrations
        # and will skip already-applied files. The check provides an additional safety net.
        run: |
          if ls apps/api/migrations/*.sql 1>/dev/null 2>&1; then
            chmod +x scripts/migrations/apply-safe.sh
            ./scripts/migrations/apply-safe.sh production webwaka-production || true
          else
            echo "No migrations staged — skipping safety check"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload migration audit artifact (production)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-audit-production-${{ github.sha }}
          path: migration-audit-*.txt
          if-no-files-found: ignore
          retention-days: 90

      - name: Guard 0374 idempotence on production D1
        # SQLite/D1 does not support ALTER TABLE ADD COLUMN IF NOT EXISTS.
        # Migration 0374 adds refresh_interval_days + next_refresh_due to seed_sources.
        # If those columns already exist on production (e.g. from a partial earlier run),
        # this step marks 0374 as applied in d1_migrations so wrangler skips it, then
        # runs only the idempotent UPDATE portion of that migration.
        run: |
          cd apps/api
          echo "Checking whether 0374 columns already exist on production D1..."
          npx wrangler d1 execute webwaka-production \
            --env production \
            --remote \
            --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at)
              SELECT '0374_s14_claim_readiness.sql', datetime('now')
              FROM pragma_table_info('seed_sources')
              WHERE name = 'refresh_interval_days'
              LIMIT 1;"
          echo "Running 0374 UPDATE (idempotent — safe even if 0 rows match)..."
          npx wrangler d1 execute webwaka-production \
            --env production \
            --remote \
            --command="UPDATE profiles
              SET    claim_state = 'claimable',
                     updated_at  = strftime('%s', 'now')
              WHERE  tenant_id   = 'tenant_platform_seed'
              AND    claim_state = 'seeded';"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Guard 0432 schema compatibility on production D1
        # Migration 0432 renames support_groups to groups and updates references.
        # Production database may not have support_groups tables (already groups) or
        # may lack search_entries.record_type column. This guard handles all scenarios.
        #
        # BUG-432-PROD: production had 0432 marked as applied in d1_migrations but the
        # groups table was never actually created (rollback files ran in previous deploys).
        # Fix: if groups table is missing AND 0432 is already in d1_migrations, delete the
        # d1_migrations entry so wrangler re-applies 0432 (uses CREATE TABLE IF NOT EXISTS
        # so it is safe to re-apply). This restores groups from support_groups data.
        run: |
          cd apps/api
          echo "Checking if 0432 migration is needed..."

          # Check if groups table already exists
          GROUPS_EXISTS=$(npx wrangler d1 execute webwaka-production \
            --env production \
            --remote \
            --json \
            --command="SELECT COUNT(*) as cnt FROM sqlite_master WHERE type='table' AND name='groups';" \
            | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")

          if [ "$GROUPS_EXISTS" = "1" ]; then
            echo "✅ groups table already exists — ensuring 0432 is marked applied"
            npx wrangler d1 execute webwaka-production \
              --env production \
              --remote \
              --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('0432_rename_support_groups_to_groups.sql', datetime('now'));"
          else
            # groups table is missing — check support_groups
            SUPPORT_GROUPS_EXISTS=$(npx wrangler d1 execute webwaka-production \
              --env production \
              --remote \
              --json \
              --command="SELECT COUNT(*) as cnt FROM sqlite_master WHERE type='table' AND name='support_groups';" \
              | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")

            # Check if 0432 is erroneously already in d1_migrations (BUG-432-PROD)
            MIGRATION_0432_APPLIED=$(npx wrangler d1 execute webwaka-production \
              --env production \
              --remote \
              --json \
              --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0432_rename_support_groups_to_groups.sql';" \
              | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")

            if [ "$SUPPORT_GROUPS_EXISTS" = "1" ] && [ "$MIGRATION_0432_APPLIED" = "1" ]; then
              echo "⚠️  BUG-432-PROD: groups missing, support_groups present, 0432 already in d1_migrations"
              echo "   Removing 0432 from d1_migrations so wrangler re-applies it properly..."
              npx wrangler d1 execute webwaka-production \
                --env production \
                --remote \
                --command="DELETE FROM d1_migrations WHERE name='0432_rename_support_groups_to_groups.sql';"
              echo "✅ 0432 entry cleared — wrangler will now re-apply 0432 and create groups from support_groups"
            elif [ "$SUPPORT_GROUPS_EXISTS" = "1" ]; then
              echo "✅ support_groups exists and 0432 is not applied — wrangler will run 0432 normally"
            else
              echo "ℹ️  Neither groups nor support_groups exists — creating groups table structure"
              # Create minimal groups table structure that 0433+ depend on
              cat > /tmp/create_groups.sql << 'EOF'
          CREATE TABLE IF NOT EXISTS groups (
            id TEXT NOT NULL,
            workspace_id TEXT NOT NULL,
            tenant_id TEXT NOT NULL,
            name TEXT NOT NULL,
            slug TEXT NOT NULL,
            description TEXT,
            category TEXT NOT NULL DEFAULT 'general',
            hierarchy_level TEXT,
            parent_group_id TEXT,
            place_id TEXT,
            state_code TEXT,
            lga_code TEXT,
            ward_code TEXT,
            polling_unit_code TEXT,
            member_count INTEGER NOT NULL DEFAULT 0,
            volunteer_count INTEGER NOT NULL DEFAULT 0,
            visibility TEXT NOT NULL DEFAULT 'public',
            join_policy TEXT NOT NULL DEFAULT 'open',
            status TEXT NOT NULL DEFAULT 'active',
            logo_url TEXT,
            cover_url TEXT,
            constitution_url TEXT,
            website_url TEXT,
            ndpr_consent_required INTEGER NOT NULL DEFAULT 0,
            created_at INTEGER NOT NULL,
            updated_at INTEGER NOT NULL,
            PRIMARY KEY (id),
            FOREIGN KEY (parent_group_id) REFERENCES groups(id) ON DELETE SET NULL
          );
          CREATE UNIQUE INDEX IF NOT EXISTS uidx_groups_slug_tenant ON groups(slug, tenant_id);
          CREATE INDEX IF NOT EXISTS idx_groups_workspace_tenant ON groups(workspace_id, tenant_id);
          EOF
              npx wrangler d1 execute webwaka-production \
                --env production \
                --remote \
                --file=/tmp/create_groups.sql
              echo "✅ groups table created — marking 0432 as applied"
              npx wrangler d1 execute webwaka-production \
                --env production \
                --remote \
                --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('0432_rename_support_groups_to_groups.sql', datetime('now'));"
            fi
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Guard 0462 fundraising_campaigns column rename on production D1
        # Migration 0462 renames fundraising_campaigns.support_group_id → group_id.
        # If group_id already exists (from a partial prior run) this would fail.
        # If support_group_id is missing too, skip rename and mark 0462's column step safe.
        run: |
          cd apps/api
          echo "Checking 0462 fundraising_campaigns column state..."

          # Check if group_id already exists (rename already done or never needed)
          GROUP_ID_EXISTS=$(npx wrangler d1 execute webwaka-production \
            --env production --remote --json \
            --command="SELECT COUNT(*) as cnt FROM pragma_table_info('fundraising_campaigns') WHERE name='group_id';" \
            | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")

          # Check if support_group_id still exists (rename still needed)
          SUPPORT_GROUP_ID_EXISTS=$(npx wrangler d1 execute webwaka-production \
            --env production --remote --json \
            --command="SELECT COUNT(*) as cnt FROM pragma_table_info('fundraising_campaigns') WHERE name='support_group_id';" \
            | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")

          if [ "$GROUP_ID_EXISTS" = "1" ] && [ "$SUPPORT_GROUP_ID_EXISTS" = "0" ]; then
            echo "✅ group_id already exists and support_group_id removed — marking 0462 column step safe"
            # Insert as applied so wrangler skips 0462 (column rename already done)
            npx wrangler d1 execute webwaka-production \
              --env production --remote \
              --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('0462_drop_support_groups_shadow_tables.sql', datetime('now'));"
          elif [ "$SUPPORT_GROUP_ID_EXISTS" = "1" ]; then
            echo "✅ support_group_id exists — 0462 RENAME COLUMN will run normally"
          else
            echo "ℹ️  Neither column found in fundraising_campaigns — 0462 RENAME will be a no-op (safe)"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Guard 0463 fundraising compliance column rename on production D1
        # Migration 0463 renames inec_cap_kobo → contribution_cap_kobo and
        # inec_disclosure_required → disclosure_required on fundraising_campaigns.
        # Check column state to avoid double-rename errors.
        run: |
          cd apps/api
          echo "Checking 0463 fundraising compliance column state..."

          NEW_COL_EXISTS=$(npx wrangler d1 execute webwaka-production \
            --env production --remote --json \
            --command="SELECT COUNT(*) as cnt FROM pragma_table_info('fundraising_campaigns') WHERE name='contribution_cap_kobo';" \
            | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")

          OLD_COL_EXISTS=$(npx wrangler d1 execute webwaka-production \
            --env production --remote --json \
            --command="SELECT COUNT(*) as cnt FROM pragma_table_info('fundraising_campaigns') WHERE name='inec_cap_kobo';" \
            | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")

          if [ "$NEW_COL_EXISTS" = "1" ]; then
            echo "✅ contribution_cap_kobo already exists — marking 0463 as applied (rename already done)"
            npx wrangler d1 execute webwaka-production \
              --env production --remote \
              --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('0463_rename_fundraising_compliance_fields.sql', datetime('now'));"
          elif [ "$OLD_COL_EXISTS" = "1" ]; then
            echo "✅ inec_cap_kobo present — 0463 will RENAME COLUMN normally"
          else
            echo "ℹ️  Neither column found — 0463 is a no-op (fundraising_campaigns may differ)"
            npx wrangler d1 execute webwaka-production \
              --env production --remote \
              --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('0463_rename_fundraising_compliance_fields.sql', datetime('now'));"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Guard 0464d individuals table compat (D1 blocks RENAME TABLE on FK-referenced tables)
        # Migration 0464d attempts to recreate individuals table with DEFAULT '' on
        # first_name/last_name by using ALTER TABLE RENAME TO. However, D1 enforces
        # FK constraints on RENAME TABLE operations (unlike standard SQLite), returning
        # 'FOREIGN KEY constraint failed' since political_assignments references individuals.
        # This guard marks 0464d as applied so wrangler skips it.
        # The political seed data (0465-0534) will continue to be blocked until D1
        # removes this restriction or the seeds are updated to provide first_name/last_name.
        run: |
          cd apps/api
          echo "Marking 0464d as deferred (D1 FK blocks RENAME TABLE on individuals)..."
          npx wrangler d1 execute webwaka-production \
            --env production --remote \
            --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('0464d_individuals_fullname_compat.sql', datetime('now'));"
          echo "✅ 0464d recorded in d1_migrations — wrangler will skip it"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Guard 0464b schema compat (superseded by 0464a expansion)
        # Migration 0464b_seed_schema_extended_compat.sql was created as a second
        # batch of schema bridge columns. However, 0464a was subsequently expanded
        # to include ALL the same columns. On any environment where 0464a already ran,
        # 0464b would fail with "duplicate column name: notes".
        #
        # This guard marks 0464b as applied if the notes column already exists
        # on seed_raw_artifacts (proving 0464a already ran and added all the columns).
        # The 0464b file has been updated to a no-op (SELECT 1), but this guard
        # provides a double safety net for any environment still holding the old
        # version of 0464b in its migration directory.
        run: |
          cd apps/api
          echo "Checking if 0464b is superseded by 0464a on production D1..."
          NOTES_EXISTS=$(npx wrangler d1 execute webwaka-production \
            --env production --remote --json \
            --command="SELECT COUNT(*) as cnt FROM pragma_table_info('seed_raw_artifacts') WHERE name='notes';" \
            | jq -r '.[0].results[0].cnt' 2>/dev/null || echo "0")
          if [ "$NOTES_EXISTS" = "1" ]; then
            echo "✅ seed_raw_artifacts.notes exists (added by 0464a) — marking 0464b as applied to skip duplicate"
            npx wrangler d1 execute webwaka-production \
              --env production --remote \
              --command="INSERT OR IGNORE INTO d1_migrations (name, applied_at) VALUES ('0464b_seed_schema_extended_compat.sql', datetime('now'));"
          else
            echo "ℹ️  notes column not found — 0464b may be needed; wrangler will attempt to apply it"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply D1 migrations (production)
        run: |
          # Run from apps/api so pnpm can resolve the wrangler binary.
          if ls apps/api/migrations/*.sql 1>/dev/null 2>&1; then
            cd apps/api
            npx wrangler d1 migrations apply webwaka-production \
              --env production \
              --remote
          else
            echo "No migrations found — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Deploy API ─────────────────────────────────────────────────────────────
  deploy-api-production:
    name: Deploy API (Production)
    needs: [migrate-production, ci]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy API to Cloudflare Workers (production) — BUG-041 canary
        # BUG-041: Gradual canary rollout via Wrangler versions API.
        # Step 1: Upload new version (no traffic yet).
        # Step 2: Route 10% traffic to new version, 90% to current stable.
        # Step 3: Health check gate (60s) before widening.
        # Step 4: Promote to 100% if healthy; roll back if gate fails.
        id: canary_deploy
        run: |
          cd apps/api

          echo "=== Step 1: Upload new version ==="
          # Capture output first — wrangler mixes banner text with JSON on stdout
          # even with --json, causing jq to fail if piped directly.
          set +e
          UPLOAD_OUTPUT=$(npx wrangler versions upload --env production --json 2>/dev/null)
          set -e
          # Try grep extraction first (fastest, tolerates mixed output)
          NEW_VERSION=$(echo "$UPLOAD_OUTPUT" | grep -o '"version_id":"[^"]*"' | head -1 | cut -d'"' -f4 || true)
          # Fallback: python3 JSON parse on the last line that looks like JSON
          if [ -z "$NEW_VERSION" ]; then
            NEW_VERSION=$(echo "$UPLOAD_OUTPUT" | grep '^{' | tail -1 \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version_id',''))" 2>/dev/null || true)
          fi
          if [ -z "$NEW_VERSION" ]; then
            echo "versions upload not supported or unparseable — falling back to direct wrangler deploy"
            npx wrangler deploy --env production 
            exit 0
          fi
          echo "Uploaded new version: $NEW_VERSION"

          echo "=== Step 2: Canary at 10% ==="
          npx wrangler versions deploy \
            --env production \
            --version-percentage "${NEW_VERSION}=10" \
            --yes || { echo "Canary 10% failed — aborting"; exit 1; }

          echo "=== Step 3: Health gate (60s) ==="
          sleep 60
          BASE="${PRODUCTION_HEALTH_URL:-https://api.webwaka.com}"
          STATUS=$(curl -sf "$BASE/health" | jq -r '.status // empty' || echo "error")
          if [ "$STATUS" != "ok" ]; then
            echo "Health gate FAILED at 10% canary (status=$STATUS) — rolling back"
            npx wrangler versions deploy \
              --env production \
              --version-percentage "${NEW_VERSION}=0" \
              --yes || true
            exit 1
          fi
          echo "Health gate passed at 10% canary (status=$STATUS)"

          echo "=== Step 4: Full rollout to 100% ==="
          npx wrangler versions deploy \
            --env production \
            --version-percentage "${NEW_VERSION}=100" \
            --yes
          echo "Canary deploy complete: version $NEW_VERSION at 100% traffic"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PRODUCTION_HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}
      - name: Push secrets to production worker
        run: |
          cd apps/api
          echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET --env production
          echo "$INTER_SERVICE_SECRET" | npx wrangler secret put INTER_SERVICE_SECRET --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTER_SERVICE_SECRET: ${{ secrets.INTER_SERVICE_SECRET }}

  # ── Deploy remaining workers (parallel) ────────────────────────────────────
  deploy-workers-production:
    name: Deploy ${{ matrix.app }} (Production)
    needs: migrate-production
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        app:
          - public-discovery
          - brand-runtime
          - notificator
          - partner-admin
          - projections
          - tenant-public
          - ussd-gateway
          - admin-dashboard
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npm install -g wrangler@4
      - name: Deploy ${{ matrix.app }} to Cloudflare Workers (production)
        run: |
          cd apps/${{ matrix.app }}
          wrangler deploy --env production 
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Large-file reference-data migrations for production (>5 MB) ────────────
  # Applied via wrangler d1 execute --file which handles chunked submission.
  # All steps are idempotent and continue-on-error to avoid blocking the deploy.
  large-seed-migrations-production:
    name: Large Reference-Data Seeds (Production)
    needs: migrate-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
