            "0523_political_nasarawa_assembly_full_roster_seed.sql"
            "0524_political_niger_assembly_full_roster_seed.sql"
            "0525_political_ondo_assembly_full_roster_seed.sql"
            "0526_political_osun_assembly_full_roster_seed.sql"
            "0527_political_plateau_assembly_full_roster_seed.sql"
            "0528_political_sokoto_assembly_full_roster_seed.sql"
