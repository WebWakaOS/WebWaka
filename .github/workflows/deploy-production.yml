name: Deploy — Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI checks ──────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ── D1 Migrations ──────────────────────────────────────────────────────────
  migrate-production:
    name: D1 Migrations (Production)
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply D1 migrations (production)
        run: |
          if [ -d "infra/db/migrations" ] && ls infra/db/migrations/*.sql 1>/dev/null 2>&1; then
            npx wrangler d1 migrations apply webwaka-os-production \
              --env production \
              --migrations-dir infra/db/migrations
          else
            echo "No migrations found at infra/db/migrations — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Deploy apps ────────────────────────────────────────────────────────────
  deploy-api-production:
    name: Deploy API (Production)
    needs: migrate-production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy API to Cloudflare Workers (production)
        run: |
          if [ -f "apps/api/wrangler.toml" ]; then
            pnpm --filter api build
            npx wrangler deploy --env production
          else
            echo "apps/api/wrangler.toml not found — skipping deploy (pre-Milestone 3)"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Smoke tests ────────────────────────────────────────────────────────────
  smoke-test-production:
    name: Smoke Test (Production)
    needs: deploy-api-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run production smoke tests
        run: |
          if [ -f "tests/smoke/package.json" ]; then
            pnpm --filter smoke run smoke:production
          else
            echo "Smoke tests not yet implemented — skipping (pre-Milestone 3)"
          fi
        env:
          SMOKE_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
