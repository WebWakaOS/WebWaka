name: Governance Check

on:
  pull_request:
    paths:
      - "docs/governance/**"
      - "docs/architecture/decisions/**"

jobs:
  governance-doc-check:
    name: Verify governance doc structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required governance docs exist
        run: |
          MISSING=0
          for doc in \
            "docs/governance/security-baseline.md" \
            "docs/governance/release-governance.md" \
            "docs/governance/platform-invariants.md" \
            "docs/governance/agent-execution-rules.md" \
            "docs/governance/milestone-tracker.md"; do
            if [ ! -f "$doc" ]; then
              echo "MISSING: $doc"
              MISSING=1
            fi
          done
          if [ "$MISSING" = "1" ]; then
            echo "FAIL: Missing required governance documents."
            exit 1
          else
            echo "OK: All required governance docs present."
          fi

      - name: Enforce founder-approval label (BUG-056)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          echo "Checking founder-approval label on PR #${PR_NUMBER}..."
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")')
          echo "Labels found: $LABELS"
          if echo "$LABELS" | grep -q "founder-approval"; then
            echo "OK: founder-approval label present. Governance change approved."
          else
            echo "FAIL: Governance docs changed but 'founder-approval' label is missing."
            echo "Add the 'founder-approval' label to this PR before merging."
            exit 1
          fi
