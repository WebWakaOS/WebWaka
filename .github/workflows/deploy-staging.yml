name: Deploy — Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # ── CI checks ──────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ── D1 Migrations ──────────────────────────────────────────────────────────
  migrate-staging:
    name: D1 Migrations (Staging)
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Stage migrations for wrangler
        run: |
          if [ -d "infra/db/migrations" ] && ls infra/db/migrations/*.sql 1>/dev/null 2>&1; then
            mkdir -p apps/api/migrations
            cp infra/db/migrations/*.sql apps/api/migrations/
            echo "Staged $(ls apps/api/migrations/*.sql | wc -l) migration files"
          else
            echo "No migrations to stage"
          fi
      - name: Apply D1 migrations (staging)
        run: |
          if ls apps/api/migrations/*.sql 1>/dev/null 2>&1; then
            npx wrangler d1 migrations apply webwaka-staging \
              --env staging \
              --remote \
              --config apps/api/wrangler.toml
          else
            echo "No migrations found — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Deploy apps ────────────────────────────────────────────────────────────
  deploy-api-staging:
    name: Deploy API (Staging)
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy API to Cloudflare Workers (staging)
        run: |
          pnpm --filter api build
          npx wrangler deploy --env staging --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Push secrets to staging worker
        run: |
          echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET \
            --env staging --config apps/api/wrangler.toml
          echo "$INTER_SERVICE_SECRET" | npx wrangler secret put INTER_SERVICE_SECRET \
            --env staging --config apps/api/wrangler.toml
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTER_SERVICE_SECRET: ${{ secrets.INTER_SERVICE_SECRET }}

  # ── Smoke tests ────────────────────────────────────────────────────────────
  smoke-test-staging:
    name: Smoke Test (Staging)
    needs: deploy-api-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run staging smoke tests
        run: |
          if [ -f "tests/smoke/package.json" ]; then
            pnpm --filter smoke run smoke:staging
          else
            echo "Smoke tests not yet implemented — skipping (pre-Milestone 3)"
          fi
        env:
          SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}

