name: Deploy — Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # ── CI checks ──────────────────────────────────────────────────────────────
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── D1 Migrations ──────────────────────────────────────────────────────────
  migrate-staging:
    name: D1 Migrations (Staging)
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Stage migrations for wrangler
        run: |
          # wrangler.toml migrations_dir = "migrations" (relative to apps/api/)
          # Real migrations live in infra/db/migrations — copy only forward
          # migrations (*.sql) and exclude rollback files (*.rollback.sql).
          # wrangler applies all *.sql files alphabetically; rollback files would
          # run before their forward migration and fail with "no such table".
          #
          # IMPORTANT: Clean apps/api/migrations/ first to remove any stale/orphaned
          # committed migration files (old iterations removed from infra/db/migrations/).
          # Without this, git checkout may retain removed migrations and wrangler
          # would attempt to apply them against the wrong schema.
          rm -f apps/api/migrations/*.sql
          mkdir -p apps/api/migrations
          for f in infra/db/migrations/*.sql; do
            [[ "$f" == *.rollback.sql ]] && continue
            # Skip Git LFS pointer files — these are large reference-data seeds
            # that cannot run as D1 migrations (wrangler receives the 3-line LFS
            # pointer text instead of SQL when lfs:true is not set on checkout).
            if head -1 "$f" 2>/dev/null | grep -q "^version https://git-lfs"; then
              echo "  skipped LFS seed: $(basename "$f")"
              continue
            fi
            # Skip files > 5 MB — D1 HTTP API rejects large payloads (code 7010).
            # These are bulk reference-data seeds (health, education, polling units)
            # that must be loaded via wrangler d1 execute --file in a separate job.
            FILE_SIZE=$(wc -c < "$f" 2>/dev/null || echo 0)
            if [ "$FILE_SIZE" -gt 5242880 ]; then
              echo "  skipped oversized seed: $(basename "$f") (${FILE_SIZE} bytes)"
              continue
            fi
            cp "$f" apps/api/migrations/
          done
          COUNT=$(ls apps/api/migrations/*.sql 2>/dev/null | wc -l)
          echo "Staged ${COUNT} forward migration files (rollbacks + LFS seeds excluded)"

      - name: Pre-apply migration safety check (BUG-002 ALTER TABLE guard)
        # Scans staged migrations for ALTER TABLE ADD COLUMN patterns and checks whether
        # each column already exists in the D1 schema via pragma_table_info.
        # Produces migration-audit-<sha>.txt for the artifact upload step.
        # This step is informational — wrangler tracks applied migrations in d1_migrations
        # and will skip already-applied files. The check provides an additional safety net.
        run: |
          if ls apps/api/migrations/*.sql 1>/dev/null 2>&1; then
            chmod +x scripts/migrations/apply-safe.sh
            ./scripts/migrations/apply-safe.sh staging webwaka-staging || true
          else
            echo "No migrations staged — skipping safety check"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload migration audit artifact (staging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-audit-staging-${{ github.sha }}
          path: migration-audit-*.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Apply D1 migrations (staging)
        run: |
          # Run from apps/api so pnpm can resolve the wrangler binary.
          # database_name in wrangler.toml is "webwaka-staging".
          cd apps/api
          echo "y" | npx wrangler d1 migrations apply webwaka-staging \
            --env staging \
            --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Deploy API ─────────────────────────────────────────────────────────────
  deploy-api-staging:
    name: Deploy API (Staging)
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Deploy API to Cloudflare Workers (staging)
        run: |
          cd apps/api
          npx wrangler deploy --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Sync secrets to staging worker
        # wrangler secret put reads from stdin to avoid shell history leakage.
        run: |
          cd apps/api
          echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET --env staging
          echo "$INTER_SERVICE_SECRET" | npx wrangler secret put INTER_SERVICE_SECRET --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTER_SERVICE_SECRET: ${{ secrets.INTER_SERVICE_SECRET }}

      - name: Post deploy health check
        # continue-on-error: the /health endpoint may return 403 behind
        # Cloudflare Access on staging; the worker itself is deployed and
        # this step surfaces status without blocking downstream jobs.
        continue-on-error: true
        run: |
          echo "Waiting 10 s for worker to propagate..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.webwaka.com/health)
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Staging health check returned HTTP $STATUS (may be behind Cloudflare Access)"
          else
            echo "✅ api-staging.webwaka.com is healthy"
          fi

  # ── Smoke tests ────────────────────────────────────────────────────────────
  smoke-test-staging:
    name: Smoke Test (Staging)
    needs: deploy-api-staging
    # SMOKE_API_KEY must be provisioned before this becomes a hard gate.
    # Until then, failures surface as warnings, not deploy blockers.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Run staging smoke tests
        run: pnpm --filter smoke run smoke:staging
        env:
          SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}
          SMOKE_TENANT_ID: ${{ vars.SMOKE_TENANT_ID }}
          SMOKE_API_KEY: ${{ secrets.SMOKE_API_KEY }}

  # ── Deploy remaining workers (parallel, independent of API secrets sync) ────
  deploy-workers-staging:
    name: Deploy ${{ matrix.app }} (Staging)
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      matrix:
        app:
          - public-discovery
          - brand-runtime
          - notificator
          - partner-admin
          - projections
          - tenant-public
          - ussd-gateway
          - admin-dashboard
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      # Install wrangler globally so every matrix worker can deploy without
      # needing wrangler in its own package.json (only apps/api carries it).
      - run: npm install -g wrangler@4
      - name: Deploy ${{ matrix.app }} to Cloudflare Workers (staging)
        run: |
          cd apps/${{ matrix.app }}
          wrangler deploy --env staging
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── QA Seed Data ────────────────────────────────────────────────────────────
  seed-staging:
    name: QA Seed Data (Staging)
    needs: [deploy-api-staging, deploy-workers-staging]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Seed phase 1 — Users
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-1-users.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 2 — Tenants
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-2-tenants.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 3 — Partners
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-3-partners.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 4 — Financial
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-4-financial.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 5 — Offerings
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-5-offerings.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 6 — Notifications
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-6-notifications.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 7 — FX Rates
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-7-fx-rates.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 8 — USSD Sessions
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-8-ussd-sessions.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Seed phase 9 — Subscriptions + POS
        continue-on-error: true
        run: cd apps/api && npx wrangler d1 execute webwaka-staging --env staging --remote --file ../../scripts/seed/phase-9-subscriptions-and-pos.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── Large-file reference-data migrations (>5 MB, chunked via wrangler d1 execute --file) ────
  # These files exceed the D1 HTTP API 5 MB payload limit and were skipped by the standard
  # migrate-staging job. wrangler d1 execute --file handles chunked submission automatically.
  # Each step is idempotent: it inserts the migration name into d1_migrations on success so
  # wrangler will skip the file on the next run.
  large-seed-migrations-staging:
    name: Large Reference-Data Seeds (Staging)
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Apply HDX Health Facilities — North-Central & North-East (0492)
        continue-on-error: true
        run: |
          cd apps/api
          if npx wrangler d1 execute webwaka-staging --env staging --remote \
            --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0492_hdx_health_nc_ne_seed.sql'" \
            --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[0]['results'][0]['cnt']==0 else 1)" 2>/dev/null; then
            npx wrangler d1 execute webwaka-staging --env staging --remote \
              --file ../../infra/db/migrations/0492_hdx_health_nc_ne_seed.sql
            echo "✅ 0492 applied"
          else
            echo "ℹ️  0492 already applied — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Apply HDX Health Facilities — North-West (0493)
        continue-on-error: true
        run: |
          cd apps/api
          if npx wrangler d1 execute webwaka-staging --env staging --remote \
            --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0493_hdx_health_nw_seed.sql'" \
            --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[0]['results'][0]['cnt']==0 else 1)" 2>/dev/null; then
            npx wrangler d1 execute webwaka-staging --env staging --remote \
              --file ../../infra/db/migrations/0493_hdx_health_nw_seed.sql
            echo "✅ 0493 applied"
          else
            echo "ℹ️  0493 already applied — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Apply HDX Health Facilities — South-East (0494)
        continue-on-error: true
        run: |
          cd apps/api
          if npx wrangler d1 execute webwaka-staging --env staging --remote \
            --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0494_hdx_health_se_seed.sql'" \
            --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[0]['results'][0]['cnt']==0 else 1)" 2>/dev/null; then
            npx wrangler d1 execute webwaka-staging --env staging --remote \
              --file ../../infra/db/migrations/0494_hdx_health_se_seed.sql
            echo "✅ 0494 applied"
          else
            echo "ℹ️  0494 already applied — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Apply HDX Health Facilities — South-South (0495)
        continue-on-error: true
        run: |
          cd apps/api
          if npx wrangler d1 execute webwaka-staging --env staging --remote \
            --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0495_hdx_health_ss_seed.sql'" \
            --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[0]['results'][0]['cnt']==0 else 1)" 2>/dev/null; then
            npx wrangler d1 execute webwaka-staging --env staging --remote \
              --file ../../infra/db/migrations/0495_hdx_health_ss_seed.sql
            echo "✅ 0495 applied"
          else
            echo "ℹ️  0495 already applied — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Apply HDX Health Facilities — South-West (0496)
        continue-on-error: true
        run: |
          cd apps/api
          if npx wrangler d1 execute webwaka-staging --env staging --remote \
            --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0496_hdx_health_sw_seed.sql'" \
            --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[0]['results'][0]['cnt']==0 else 1)" 2>/dev/null; then
            npx wrangler d1 execute webwaka-staging --env staging --remote \
              --file ../../infra/db/migrations/0496_hdx_health_sw_seed.sql
            echo "✅ 0496 applied"
          else
            echo "ℹ️  0496 already applied — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Apply OSM Hospitals & Medical Facilities (0499)
        continue-on-error: true
        run: |
          cd apps/api
          if npx wrangler d1 execute webwaka-staging --env staging --remote \
            --command="SELECT COUNT(*) as cnt FROM d1_migrations WHERE name='0499_osm_s13_hospitals_medical_seed.sql'" \
            --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d[0]['results'][0]['cnt']==0 else 1)" 2>/dev/null; then
            npx wrangler d1 execute webwaka-staging --env staging --remote \
              --file ../../infra/db/migrations/0499_osm_s13_hospitals_medical_seed.sql
            echo "✅ 0499 applied"
          else
            echo "ℹ️  0499 already applied — skipping"
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ── QA Gate — Playwright Cycles 01–08 ──────────────────────────────────────
  # Cycle 09 (visual regression) is excluded from CI: it requires snapshot
  # baselines committed to the repo; run pnpm test:cycle-09 locally after
  # running `pnpm test:visual:update` to establish the baseline.
  qa-gate-staging:
    name: QA Gate — Cycles 01–08 (Staging)
    needs: [seed-staging, large-seed-migrations-staging]
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: https://api-staging.webwaka.com
      DISCOVERY_BASE_URL: ${{ vars.STAGING_DISCOVERY_URL }}
      E2E_TENANT_ID: ${{ vars.SMOKE_TENANT_ID }}
      E2E_API_KEY: ${{ secrets.SMOKE_API_KEY }}
      E2E_WORKSPACE_ID: ${{ vars.SMOKE_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Cycle 01 — Smoke
        run: pnpm test:cycle-01
      - name: Cycle 02 — Critical Path (tenant isolation, JWT/CSRF, payments, compliance invariants, HITL, MON-04 limits)
        run: pnpm test:cycle-02
      - name: Cycle 03 — Role / Permission Matrix
        run: pnpm test:cycle-03
      - name: Cycle 04 — Full Compliance Suite (CBN, NDPR, INEC, FIRS, NBA, BPP)
        run: pnpm test:cycle-04
      - name: Cycle 05 — Payments / Wallet Lifecycle (bank transfer FSM, wallet HITL)
        run: pnpm test:cycle-05
      - name: Cycle 06 — B2B Marketplace / Negotiation
        run: pnpm test:cycle-06
      - name: Cycle 07 — USSD Full Tree
        run: pnpm test:cycle-07
      - name: Cycle 08 — Analytics / Projections
        run: pnpm test:cycle-08
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-${{ github.sha }}
          path: tests/e2e/reports/
          retention-days: 30

  # ── Summary ────────────────────────────────────────────────────────────────
  notify-success:
    name: Notify Success
    needs: [smoke-test-staging, qa-gate-staging]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Print deploy summary
        run: |
          echo "## ✅ Staging Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Endpoint** | https://api-staging.webwaka.com |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **QA Gate** | Cycles 01–08 passed ✅ |" >> $GITHUB_STEP_SUMMARY

  # ── Deploy frontend apps to Cloudflare Pages (staging) ─────────────────────
  deploy-pages-staging:
    name: Deploy CF Pages (Staging)
    needs: [migrate-staging]
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      matrix:
        app:
          - name: workspace-app
            project: webwaka-workspace-app
            build_cmd: pnpm --filter @webwaka/workspace-app build
            dist: apps/workspace-app/dist
            api_url: https://api-staging.webwaka.com
          - name: marketing-site
            project: webwaka-marketing-site
            build_cmd: pnpm --filter @webwaka/marketing-site build
            dist: apps/marketing-site/dist
            api_url: ""
          - name: platform-admin
            project: webwaka-platform-admin
            build_cmd: echo "No build step needed for platform-admin static site"
            dist: apps/platform-admin/public
            api_url: ""
          - name: discovery-spa
            project: webwaka-discovery
            build_cmd: pnpm --filter @webwaka/discovery-spa build
            dist: apps/discovery-spa/dist
            api_url: https://api-staging.webwaka.com
          - name: partner-admin-spa
            project: webwaka-partner-admin-spa
            build_cmd: pnpm --filter @webwaka/partner-admin-spa build
            dist: apps/partner-admin-spa/dist
            api_url: https://api-staging.webwaka.com
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: npm install -g wrangler@4

      - name: Build ${{ matrix.app.name }}
        run: ${{ matrix.app.build_cmd }}
        env:
          VITE_API_URL: ${{ matrix.app.api_url }}
          VITE_DISCOVERY_API: ${{ matrix.app.api_url }}
          NODE_ENV: production

      - name: Deploy ${{ matrix.app.name }} to CF Pages (staging preview)
        run: |
          wrangler pages deploy "${{ matrix.app.dist }}" \
            --project-name "${{ matrix.app.project }}" \
            --branch staging \
            --commit-hash "${{ github.sha }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
