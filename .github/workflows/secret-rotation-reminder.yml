name: Secret Rotation Reminder

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-rotation:
    name: Check Secret Rotation Schedule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check rotation schedule
        id: check
        run: |
          # Parse the rotation log for secrets approaching their rotation deadline
          ROTATION_LOG="docs/ops/secrets-rotation-log.md"
          if [ ! -f "$ROTATION_LOG" ]; then
            echo "No rotation log found"
            exit 0
          fi

          TODAY=$(date +%s)
          SEVEN_DAYS=$((7 * 86400))
          SECRETS_DUE=""

          # Parse table rows from the rotation log
          while IFS='|' read -r _ secret _ last_rotated _ next_due _; do
            secret=$(echo "$secret" | xargs)
            next_due=$(echo "$next_due" | xargs)

            # Skip header rows and empty lines
            [[ "$secret" == "Secret" ]] && continue
            [[ "$secret" == "---"* ]] && continue
            [[ -z "$next_due" ]] && continue

            # Parse date (YYYY-MM-DD format)
            if date -d "$next_due" +%s > /dev/null 2>&1; then
              DUE_TS=$(date -d "$next_due" +%s)
              DAYS_UNTIL=$(( (DUE_TS - TODAY) / 86400 ))

              if [ $DAYS_UNTIL -le 7 ]; then
                SECRETS_DUE="${SECRETS_DUE}\n- **${secret}**: due in ${DAYS_UNTIL} days (${next_due})"
              fi
            fi
          done < "$ROTATION_LOG"

          if [ -n "$SECRETS_DUE" ]; then
            echo "secrets_due=true" >> $GITHUB_OUTPUT
            echo "details<<EOF" >> $GITHUB_OUTPUT
            echo -e "$SECRETS_DUE" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "secrets_due=false" >> $GITHUB_OUTPUT
          fi

      - name: Create rotation reminder issue
        if: steps.check.outputs.secrets_due == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const details = `${{ steps.check.outputs.details }}`;
            const title = `🔐 Secret Rotation Due — ${new Date().toISOString().slice(0, 10)}`;
            const body = `## Secrets Approaching Rotation Deadline\n\nThe following secrets are due for rotation within 7 days:\n\n${details}\n\n### Rotation Procedure\n\n1. Generate new secret: \`openssl rand -base64 32\`\n2. Update Cloudflare: \`echo "NEW" | wrangler secret put SECRET_NAME --env production\`\n3. Update GitHub secret (if applicable)\n4. Update rotation log: \`docs/ops/secrets-rotation-log.md\`\n5. Verify application health after rotation\n\nSee [Operational Runbook](docs/ops/RUNBOOK.md#secret-rotation) for full procedure.`;

            // Check if an issue already exists for this week
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'secret-rotation',
            });

            if (existingIssues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['secret-rotation', 'security', 'ops'],
              });
            }
