name: Secret Rotation Reminder

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-rotation:
    name: Check Secret Rotation Schedule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse rotation log and detect upcoming expirations
        id: check
        run: |
          # Canonical rotation log location
          ROTATION_LOG="infra/cloudflare/secrets-rotation-log.md"
          if [ ! -f "$ROTATION_LOG" ]; then
            echo "Rotation log not found at $ROTATION_LOG — skipping"
            echo "secrets_due=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TODAY=$(date +%s)
          SECRETS_DUE=""
          OVERDUE=""

          # Parse markdown table rows: | `SECRET_NAME` | location | created | last_rotated | next_rotation | procedure |
          while IFS='|' read -r _ raw_name _ _ _ next_due _; do
            # Strip whitespace and backticks
            secret=$(echo "$raw_name" | tr -d '`' | xargs)
            next_due=$(echo "$next_due" | xargs)

            # Skip header/separator rows
            [[ "$secret" == "Secret Name" ]] && continue
            [[ "$secret" == ---* ]] && continue
            [[ -z "$secret" ]] && continue
            [[ -z "$next_due" ]] && continue

            # Validate date format YYYY-MM-DD
            if ! date -d "$next_due" "+%s" > /dev/null 2>&1; then
              continue
            fi

            DUE_TS=$(date -d "$next_due" "+%s")
            DAYS_UNTIL=$(( (DUE_TS - TODAY) / 86400 ))

            if [ "$DAYS_UNTIL" -lt 0 ]; then
              OVERDUE="${OVERDUE}\n- ⛔ **\`${secret}\`**: OVERDUE by $(( -DAYS_UNTIL )) days (was due ${next_due})"
            elif [ "$DAYS_UNTIL" -le 7 ]; then
              SECRETS_DUE="${SECRETS_DUE}\n- ⚠️ **\`${secret}\`**: due in ${DAYS_UNTIL} day(s) (${next_due})"
            fi
          done < "$ROTATION_LOG"

          ALL="${OVERDUE}${SECRETS_DUE}"
          if [ -n "$ALL" ]; then
            echo "secrets_due=true" >> "$GITHUB_OUTPUT"
            {
              echo "details<<DETAILS_EOF"
              echo -e "$ALL"
              echo "DETAILS_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "secrets_due=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open GitHub issue if secrets are due
        if: steps.check.outputs.secrets_due == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const details = `${{ steps.check.outputs.details }}`;
            const today  = new Date().toISOString().slice(0, 10);
            const title  = `🔐 Secret Rotation Due — ${today}`;
            const body = [
              `## Secrets Approaching Rotation Deadline`,
              ``,
              `The following secrets need attention within the next 7 days (or are already overdue):`,
              ``,
              details,
              ``,
              `### Rotation Procedure`,
              ``,
              `1. Generate new value: \`openssl rand -base64 32\` (or regenerate in provider dashboard)`,
              `2. Staging: \`echo "VALUE" | wrangler secret put SECRET_NAME --env staging\``,
              `3. Production: \`echo "VALUE" | wrangler secret put SECRET_NAME --env production\``,
              `4. Update GitHub Actions secret if applicable (repo Settings → Secrets)`,
              `5. Verify staging & production health endpoints pass`,
              `6. Update **Last Rotated** and **Next Rotation** in [\`infra/cloudflare/secrets-rotation-log.md\`](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/staging/infra/cloudflare/secrets-rotation-log.md)`,
              ``,
              `📖 Full procedure: [Operational Runbook — Secret Rotation](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/staging/docs/ops/RUNBOOK.md#secret-rotation)`,
            ].join('\n');

            // Avoid duplicate open issues for this week (label: secret-rotation)
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'secret-rotation',
              per_page: 5,
            });

            if (existing.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['secret-rotation', 'security', 'ops'],
              });
              console.log(`Created issue: ${title}`);
            } else {
              console.log(`Issue already open (${existing[0].html_url}) — skipping creation`);
            }
