name: CI

on:
  pull_request:
    branches:
      - staging
      - main
  push:
    branches:
      - staging
      - main
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Restore TypeScript incremental cache
        uses: actions/cache@v4
        with:
          path: |
            apps/**/.tsbuildinfo
            packages/**/.tsbuildinfo
            .tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('**/tsconfig*.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      # Limit concurrency to avoid SIGTERM on 2-core GitHub runners with 200+ packages.
      - run: pnpm -r --workspace-concurrency=4 run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  openapi-lint:
    name: OpenAPI Spec Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint OpenAPI spec (ADR-0018)
        run: npx --yes @redocly/cli@latest lint docs/openapi/v1.yaml --config .redocly.yaml

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  governance:
    name: Governance Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check CORS configuration
        run: npx tsx scripts/governance-checks/check-cors.ts
      - name: Check tenant isolation
        run: npx tsx scripts/governance-checks/check-tenant-isolation.ts
      - name: Check AI direct calls (P7)
        run: npx tsx scripts/governance-checks/check-ai-direct-calls.ts
      - name: Check monetary integrity (P9)
        run: npx tsx scripts/governance-checks/check-monetary-integrity.ts
      - name: Check dependency sources (CI-004)
        run: npx tsx scripts/governance-checks/check-dependency-sources.ts
      - name: Check migration rollback scripts (CI-003)
        run: npx tsx scripts/governance-checks/check-rollback-scripts.ts
      - name: Check pillar prefixes (DOC-010)
        run: npx tsx scripts/governance-checks/check-pillar-prefix.ts
      - name: Check PWA manifests (PWA-001)
        run: npx tsx scripts/governance-checks/check-pwa-manifest.ts
      - name: Check NDPR before AI (GAP-005)
        run: npx tsx scripts/governance-checks/check-ndpr-before-ai.ts
      - name: Check geography seed integrity (GAP-002)
        run: npx tsx scripts/governance-checks/check-geography-integrity.ts
      - name: Check vertical registry/package consistency
        run: npx tsx scripts/governance-checks/check-vertical-registry.ts
      - name: Check outbound webhook signing (SEC-007)
        run: npx tsx scripts/governance-checks/check-webhook-signing.ts
      - name: Check secret rotation schedule (SEC-008)
        run: npx tsx scripts/verify-secrets.ts
      - name: Check no rollback files in forward migrations (CI-005)
        run: npx tsx scripts/governance-checks/check-no-rollback-in-forward-dir.ts
      - name: Check migration SQL syntax (CI-006)
        run: |
          sudo apt-get install -y sqlite3 > /dev/null 2>&1
          npx tsx scripts/governance-checks/check-migration-sql-syntax.ts
      - name: Check publishEvent correlationId propagation (H-7)
        run: npx tsx scripts/governance-checks/check-publish-event-correlation.ts
      - name: Check cross-worker security baseline (H-6)
        run: npx tsx scripts/governance-checks/check-security-baseline.ts
      - name: Check notification sandbox enforcement (H-5 / G24)
        run: npx tsx scripts/governance-checks/check-notification-sandbox.ts

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Health smoke test
        run: pnpm --filter @webwaka/api exec vitest run src/routes/health.test.ts
      - name: Claims FSM smoke test
        run: pnpm --filter @webwaka/claims test
      - name: SuperAgent smoke test
        run: pnpm --filter @webwaka/superagent test
      - name: Auth smoke test
        run: pnpm --filter @webwaka/auth test

  k6-smoke:
    name: k6 Load Smoke Test
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    # k6 is a load/performance indicator — it must NOT block the deploy pipeline.
    # continue-on-error means a threshold breach surfaces as a warning, not a gate.
    continue-on-error: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate smoke test JWT tokens
        id: jwt
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_STAGING }}
        run: |
          OUTPUT=$(node infra/k6/generate-smoke-jwt.mjs)
          echo "SMOKE_JWT=$(echo "$OUTPUT" | grep '^SMOKE_JWT=' | cut -d= -f2-)" >> $GITHUB_OUTPUT
          echo "SMOKE_SUPER_ADMIN_JWT=$(echo "$OUTPUT" | grep '^SMOKE_SUPER_ADMIN_JWT=' | cut -d= -f2-)" >> $GITHUB_OUTPUT
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | \
            sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Restore k6 performance baseline
        uses: actions/cache@v4
        with:
          path: infra/k6/baseline.json
          key: k6-baseline-${{ github.ref_name }}
          restore-keys: |
            k6-baseline-staging
      - name: Run k6 smoke test (staging API)
        env:
          BASE_URL: ${{ secrets.STAGING_API_URL || 'http://localhost:8787' }}
        run: |
          k6 run \
            --env BASE_URL=$BASE_URL \
            --env JWT_TOKEN=${{ steps.jwt.outputs.SMOKE_JWT }} \
            --env SUPER_ADMIN_JWT=${{ steps.jwt.outputs.SMOKE_SUPER_ADMIN_JWT }} \
            --summary-export=infra/k6/results.json \
            infra/k6/smoke.js
      - name: Compare against performance baseline
        env:
          K6_RESULTS_FILE: infra/k6/results.json
          GITHUB_SHA: ${{ github.sha }}
        run: node infra/k6/compare-baseline.mjs
      - name: Save updated k6 baseline
        uses: actions/cache/save@v4
        if: success()
        with:
          path: infra/k6/baseline.json
          key: k6-baseline-${{ github.ref_name }}

  bundle-size:
    name: Frontend Bundle Size Check (L-7)
    runs-on: ubuntu-latest
    needs: [typecheck]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Restore bundle baseline
        uses: actions/cache@v4
        with:
          path: infra/bundle-baseline.json
          key: bundle-baseline-${{ github.ref_name }}
          restore-keys: |
            bundle-baseline-staging
      - name: Install frontend app dependencies
        run: |
          pnpm --filter @webwaka/workspace-app install --frozen-lockfile
          pnpm --filter @webwaka/discovery-spa install --frozen-lockfile
          pnpm --filter @webwaka/partner-admin-spa install --frozen-lockfile
      - name: Build frontend apps
        run: |
          pnpm --filter @webwaka/workspace-app build
          pnpm --filter @webwaka/discovery-spa build
          pnpm --filter @webwaka/partner-admin-spa build
        env:
          NODE_ENV: production
          VITE_API_URL: https://api-staging.webwaka.com
      - name: Check bundle size against baseline
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          node scripts/check-bundle-size.mjs apps/workspace-app/dist
          node scripts/check-bundle-size.mjs apps/discovery-spa/dist
          node scripts/check-bundle-size.mjs apps/partner-admin-spa/dist
      - name: Save updated bundle baseline
        uses: actions/cache/save@v4
        if: success()
        with:
          path: infra/bundle-baseline.json
          key: bundle-baseline-${{ github.ref_name }}
