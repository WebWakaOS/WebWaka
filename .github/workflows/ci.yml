name: CI

on:
  pull_request:
    branches:
      - staging
  push:
    branches:
      - staging
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  openapi-lint:
    name: OpenAPI Spec Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint OpenAPI spec (ADR-0018)
        run: npx --yes @redocly/cli@latest lint docs/openapi/v1.yaml --skip-rule no-empty-servers

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  governance:
    name: Governance Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check CORS configuration
        run: npx tsx scripts/governance-checks/check-cors.ts
      - name: Check tenant isolation
        run: npx tsx scripts/governance-checks/check-tenant-isolation.ts
      - name: Check AI direct calls (P7)
        run: npx tsx scripts/governance-checks/check-ai-direct-calls.ts
      - name: Check monetary integrity (P9)
        run: npx tsx scripts/governance-checks/check-monetary-integrity.ts
      - name: Check dependency sources (CI-004)
        run: npx tsx scripts/governance-checks/check-dependency-sources.ts
      - name: Check migration rollback scripts (CI-003)
        run: npx tsx scripts/governance-checks/check-rollback-scripts.ts
      - name: Check pillar prefixes (DOC-010)
        run: npx tsx scripts/governance-checks/check-pillar-prefix.ts
      - name: Check PWA manifests (PWA-001)
        run: npx tsx scripts/governance-checks/check-pwa-manifest.ts
      - name: Check NDPR before AI (GAP-005)
        run: npx tsx scripts/governance-checks/check-ndpr-before-ai.ts
      - name: Check geography seed integrity (GAP-002)
        run: npx tsx scripts/governance-checks/check-geography-integrity.ts
      - name: Check vertical registry/package consistency
        run: npx tsx scripts/governance-checks/check-vertical-registry.ts
      - name: Check secret rotation schedule (SEC-008)
        run: npx tsx scripts/verify-secrets.ts

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Health smoke test
        run: pnpm --filter @webwaka/api exec vitest run src/routes/health.test.ts
      - name: Claims FSM smoke test
        run: pnpm --filter @webwaka/claims test
      - name: SuperAgent smoke test
        run: pnpm --filter @webwaka/superagent test
      - name: Auth smoke test
        run: pnpm --filter @webwaka/auth test

  k6-smoke:
    name: k6 Load Smoke Test
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | \
            sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run k6 smoke test (staging API)
        env:
          BASE_URL: ${{ secrets.STAGING_API_URL || 'http://localhost:8787' }}
          JWT_TOKEN: ${{ secrets.STAGING_SMOKE_JWT }}
          SUPER_ADMIN_JWT: ${{ secrets.STAGING_SMOKE_SUPER_ADMIN_JWT }}
        run: k6 run --env BASE_URL=$BASE_URL --env JWT_TOKEN=$JWT_TOKEN --env SUPER_ADMIN_JWT=$SUPER_ADMIN_JWT infra/k6/smoke.js
