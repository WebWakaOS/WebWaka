name: Refresh Lockfile

on:
  workflow_dispatch:

jobs:
  refresh-lockfile:
    name: Regenerate pnpm-lock.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies (no frozen lockfile)
        run: pnpm install --no-frozen-lockfile
      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git diff --staged --quiet && echo "Lockfile already up to date" || \
            git commit -m "chore: regenerate pnpm-lock.yaml to match current package.json files"
          git push
