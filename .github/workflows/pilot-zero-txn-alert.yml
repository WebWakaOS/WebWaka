name: Pilot — Zero-Transaction Alert

on:
  schedule:
    # Daily at 07:00 UTC (08:00 WAT)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Slack message sent)'
        required: false
        default: 'false'
      threshold_days:
        description: 'Days active before flagging (default: 7)'
        required: false
        default: '7'

jobs:
  zero-txn-check:
    name: Check pilot operators with 0 transactions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run zero-transaction alert
        run: node scripts/pilot-zero-txn-alert.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID:        ${{ secrets.D1_DATABASE_ID_PRODUCTION }}
          SLACK_WEBHOOK_URL:     ${{ secrets.SLACK_PILOT_OPS_WEBHOOK }}
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
          THRESHOLD_DAYS:        ${{ github.event.inputs.threshold_days || '7' }}
