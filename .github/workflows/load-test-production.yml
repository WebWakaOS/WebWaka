name: Load Test — Production (Gate G2)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which test to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - superagent-chat
          - verticals
  # Also runs after successful production deploy (called by deploy-production.yml)
  workflow_call:
    inputs:
      target:
        required: false
        default: 'all'
        type: string
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      AUTH_TOKEN_PRODUCTION:
        required: false

concurrency:
  group: load-test-production
  cancel-in-progress: false

jobs:
  load-test:
    name: k6 Load Test — ${{ inputs.target || 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Run SuperAgent Chat load test
        if: inputs.target == 'all' || inputs.target == 'superagent-chat'
        run: |
          k6 run \
            --out json=results/superagent-chat-$(date +%Y%m%d-%H%M).json \
            tests/k6/superagent-chat.k6.js
        env:
          BASE_URL:     ${{ vars.PRODUCTION_BASE_URL }}
          AUTH_TOKEN:   ${{ secrets.AUTH_TOKEN_PRODUCTION }}
          WORKSPACE_ID: ${{ vars.LOAD_TEST_WORKSPACE_ID }}
        continue-on-error: false  # Failures here FAIL the gate

      - name: Run Verticals load test
        if: inputs.target == 'all' || inputs.target == 'verticals'
        run: |
          k6 run \
            --out json=results/verticals-$(date +%Y%m%d-%H%M).json \
            tests/k6/verticals-load.k6.js
        env:
          BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
        continue-on-error: false

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_id }}
          path: results/
          if-no-files-found: ignore
          retention-days: 30
