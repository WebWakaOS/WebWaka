<!DOCTYPE html>
<html lang="en-NG">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — WebWaka OS</title>
  <link rel="icon" href="/icons/icon-192.png">
  <style>
    :root {
      --primary: #0F4C81;
      --bg: #f8f9fa;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .brand {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 48px;
    }
    .brand-name { font-size: 20px; font-weight: 800; color: var(--primary); }
    .brand-badge {
      background: var(--primary); color: #fff;
      font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    h1 {
      font-size: 22px; font-weight: 700;
      color: var(--text); margin-bottom: 10px;
    }
    p {
      color: var(--muted); font-size: 15px;
      line-height: 1.6; margin-bottom: 28px;
    }
    .actions { display: flex; flex-direction: column; gap: 10px; }
    button {
      background: var(--primary); color: #fff;
      border: none; border-radius: 8px;
      padding: 14px 24px; font-size: 15px; font-weight: 600;
      cursor: pointer; min-height: 48px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    .tip {
      margin-top: 24px; padding: 12px 16px;
      background: #eff6ff; border-radius: 8px;
      font-size: 13px; color: var(--primary);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="brand">
    <span class="brand-name">WebWaka</span>
    <span class="brand-badge">OS</span>
  </div>

  <div class="card">
    <span class="icon" aria-hidden="true">📡</span>
    <h1>You're offline</h1>
    <p>
      No internet connection detected. Your POS sales are queued and will sync automatically
      when you reconnect.
    </p>
    <div class="actions">
      <button onclick="window.location.reload()">Try to reconnect</button>
    </div>
    <div class="tip">
      💡 Tip: Offline POS sales are saved locally. Make sales as usual — they'll sync when you're back online.
    </div>
  </div>
</body>
</html>
