<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — WebWaka</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f8f9fa; color: #1a1a2e; padding: 24px; }
    .card { text-align: center; max-width: 360px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    button { background: #0F4C81; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer; min-height: 44px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>You're offline</h1>
    <p>WebWaka needs a connection to sync your data. Cached pages are still available.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
