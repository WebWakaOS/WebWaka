# apps/admin-dashboard/wrangler.toml
# Admin Dashboard Worker — Pillar 1: Operations-Management
# Serves the tenant admin dashboard UI shell.
# ARC-01: Deploy config added for staging/production parity.

name = "webwaka-admin-dashboard"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
API_BASE_URL = "http://localhost:8787"

# D1 — workspace, subscription, billing lookups
[[d1_databases]]
binding = "DB"
database_name = "webwaka-main"
database_id = "local-dev-placeholder"

# ---------------------------------------------------------------------------
# Staging
# ---------------------------------------------------------------------------
[env.staging]
name = "webwaka-admin-dashboard-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
API_BASE_URL = "https://api-staging.webwaka.com"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-os-staging"
database_id = "52719457-5d5b-4f36-9a13-c90195ec78d2"

# ---------------------------------------------------------------------------
# Production
# ---------------------------------------------------------------------------
[env.production]
name = "webwaka-admin-dashboard-production"

[env.production.vars]
ENVIRONMENT = "production"
API_BASE_URL = "https://api.webwaka.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-os-production"
database_id = "72fa5ec8-52c2-4f41-b486-957d7b00c76f"

# Secrets (set via: wrangler secret put SECRET_NAME)
# Required:
#   JWT_SECRET
