# apps/projections/wrangler.toml
# Projections Worker — Infrastructure: Event Processing
# Rebuilds search index projections from event_log.
# ARC-01: Deploy config added for staging/production parity.
# N-100b (Phase 9): HITL legacy dispatch removed (OQ-002 resolved).
#   HitlService.expireAllStale() D1 writes run unconditionally.

name = "webwaka-projections"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# D1 — event_log and search index
[[d1_databases]]
binding = "DB"
database_name = "webwaka-main"
database_id = "local-dev-placeholder"

# WF-041: WALLET_KV — MLA payout feature flag + commission config
[[kv_namespaces]]
binding = "WALLET_KV"
id = "local-dev-placeholder-wallet-kv"

# ---------------------------------------------------------------------------
# Staging
# ---------------------------------------------------------------------------
[env.staging]
name = "webwaka-projections-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-os-staging"
database_id = "52719457-5d5b-4f36-9a13-c90195ec78d2"

[[env.staging.kv_namespaces]]
binding = "WALLET_KV"
id = "STAGING_WALLET_KV_ID_PLACEHOLDER"

# ---------------------------------------------------------------------------
# Production
# ---------------------------------------------------------------------------
[env.production]
name = "webwaka-projections-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-os-production"
database_id = "72fa5ec8-52c2-4f41-b486-957d7b00c76f"

[[env.production.kv_namespaces]]
binding = "WALLET_KV"
id = "PRODUCTION_WALLET_KV_ID_PLACEHOLDER"

# ---------------------------------------------------------------------------
# Scheduled CRON triggers (Issue 4 — Projections CRON + checkpoint)
# Issue 8 — HITL cross-tenant expiry + L3 escalation
# ---------------------------------------------------------------------------
[triggers]
crons = [
  "*/15 * * * *",  # Every 15 min: incremental search rebuild + HITL expiry sweep
  "0 */4 * * *",   # Every 4h: HITL expiry + search rebuild (belt-and-suspenders)
  "0 2 * * *",     # Daily 02:00 UTC: analytics snapshots + bank transfer expiry
]

# ---------------------------------------------------------------------------
# Staging triggers
# ---------------------------------------------------------------------------
[env.staging.triggers]
crons = [
  "*/15 * * * *",
  "0 */4 * * *",
  "0 2 * * *",
]

# ---------------------------------------------------------------------------
# Production triggers
# ---------------------------------------------------------------------------
[env.production.triggers]
crons = [
  "*/15 * * * *",
  "0 */4 * * *",
  "0 2 * * *",
]

# Secrets (set via: wrangler secret put SECRET_NAME)
# Required:
#   INTER_SERVICE_SECRET
