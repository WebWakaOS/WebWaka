# apps/public-discovery/wrangler.toml
# Public Discovery Worker — Pillar 3: Listing / Multi-Vendor Marketplace
# Serves geography-first entity listings, public profiles, nearby search.
# Routes: webwaka.ng/discover/* and webwaka.ng/near/* (no auth required)

name = "webwaka-public-discovery"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# D1 — entity and geography lookups
[[d1_databases]]
binding = "DB"
database_name = "webwaka-main"
database_id = "local-dev-placeholder"

# KV — geography and listing cache (TTL 60 s)
[[kv_namespaces]]
binding = "DISCOVERY_CACHE"
id = "local-dev-placeholder"

# ---------------------------------------------------------------------------
# Staging
# ---------------------------------------------------------------------------
[env.staging]
name = "webwaka-public-discovery-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-os-staging"
database_id = "7c264f00-c36d-4014-b2fe-c43e136e86f6"

[[env.staging.kv_namespaces]]
binding = "DISCOVERY_CACHE"
id = "eb26f47e1be34ce59526f9617e02f51f"

# ---------------------------------------------------------------------------
# Production
# ---------------------------------------------------------------------------
[env.production]
name = "webwaka-public-discovery-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-os-production"
database_id = "72fa5ec8-52c2-4f41-b486-957d7b00c76f"

[[env.production.kv_namespaces]]
binding = "DISCOVERY_CACHE"
id = "d82d3780283e4857966bc8fab4e2761c"

# Secrets (set via: wrangler secret put SECRET_NAME)
# Required:
#   LOG_PII_SALT
