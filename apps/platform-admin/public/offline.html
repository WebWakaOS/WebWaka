<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — WebWaka OS Platform Admin</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="theme-color" content="#00c851">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WebWaka OS">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0f1e;color:#e5e7eb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .container{text-align:center;max-width:480px;padding:2rem}
    .icon{font-size:4rem;margin-bottom:1.5rem;opacity:.6}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
    p{color:#6b7280;font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.6rem 1.25rem;border-radius:8px;font-size:.9rem;cursor:pointer;border:none;font-weight:600;background:#00c851;color:#000;text-decoration:none;transition:background .15s}
    .btn:hover{background:#00b347}
    .btn:focus-visible{outline:2px solid #00c851;outline-offset:2px}
    .status{margin-top:2rem;padding:1rem;background:#111827;border:1px solid #1f2937;border-radius:8px;font-size:.8rem;color:#6b7280}
  </style>
</head>
<body>
  <main class="container" role="main">
    <div class="icon" aria-hidden="true" role="presentation">&#128268;</div>
    <h1>You're offline</h1>
    <p>It looks like your internet connection is unavailable. Some features may not work until you're back online.</p>
    <button class="btn" onclick="window.location.reload()" aria-label="Try reloading the page">Try Again</button>
    <div class="status" role="status" aria-live="polite">
      <p>Cached data may still be available. The app will reconnect automatically when your network returns.</p>
    </div>
  </main>
</body>
</html>
