name = "log-tail"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# This worker receives tail events from all other WebWaka workers.
# It must be deployed before adding it as a tail_consumer in other workers.

[vars]
LOG_SINK = "console"
ENVIRONMENT = "staging"

# Production overrides (set via wrangler secret put):
#   LOG_SINK=axiom
#   LOG_SINK_TOKEN=<axiom-api-token>
#   LOG_SINK_DATASET=webwaka-logs
#   ENVIRONMENT=production

[env.production]
name = "log-tail-production"

[env.production.vars]
LOG_SINK = "axiom"
ENVIRONMENT = "production"
