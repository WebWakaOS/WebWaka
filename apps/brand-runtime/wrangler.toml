# apps/brand-runtime/wrangler.toml
# Brand Runtime Worker — Pillar 2: Branding / Website / Portal
# Serves tenant-branded public pages, portal login, and admin UI shell.
# Routes: brand-*.webwaka.com/* and custom domains (CNAME via Cloudflare for SaaS)

name = "webwaka-brand-runtime"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# D1 — tenant + entity lookups
[[d1_databases]]
binding = "DB"
database_name = "webwaka-main"
database_id = "local-dev-placeholder"

# KV — theme token cache (TTL 300 s)
[[kv_namespaces]]
binding = "THEME_CACHE"
id = "local-dev-placeholder"

# ---------------------------------------------------------------------------
# Staging
# ---------------------------------------------------------------------------
[env.staging]
name = "webwaka-brand-runtime-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-os-staging"
database_id = "52719457-5d5b-4f36-9a13-c90195ec78d2"

[[env.staging.kv_namespaces]]
binding = "THEME_CACHE"
id = "3093422f3e4e4252a3b542ed9a06fd18"

# Cart sessions (Pillar 2 e-commerce). 24h TTL.
# P1 audit fix (2026-04-25): binding was missing — shop/cart/checkout was
# silently broken in staging. CART_KV is now mandatory in non-dev environments.
[[env.staging.kv_namespaces]]
binding = "CART_KV"
id = "3093422f3e4e4252a3b542ed9a06fd18"

# R2 — brand asset storage (logos, cover images, favicons)
[[env.staging.r2_buckets]]
binding = "ASSETS"
bucket_name = "webwaka-os-assets-staging"

# ---------------------------------------------------------------------------
# Production
# ---------------------------------------------------------------------------
[env.production]
name = "webwaka-brand-runtime-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-os-production"
database_id = "72fa5ec8-52c2-4f41-b486-957d7b00c76f"

[[env.production.kv_namespaces]]
binding = "THEME_CACHE"
id = "d89a05e8c5814c6c966061f62dd24f8c"

# Cart sessions (Pillar 2 e-commerce). 24h TTL.
# Namespace: webwaka-cart-production (ad5ee7647f9b47d698f6ed8880c4d6b3)
[[env.production.kv_namespaces]]
binding = "CART_KV"
id = "ad5ee7647f9b47d698f6ed8880c4d6b3"

# R2 — brand asset storage (logos, cover images, favicons)
[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "webwaka-os-assets-production"

# Secrets (set via: wrangler secret put SECRET_NAME)
# Required:
#   JWT_SECRET
#   LOG_PII_SALT
#   INTER_SERVICE_SECRET
