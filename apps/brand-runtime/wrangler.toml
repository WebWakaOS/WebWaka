# apps/brand-runtime/wrangler.toml
# Brand Runtime Worker — Pillar 2: Branding / Website / Portal
# Serves tenant-branded public pages, portal login, and admin UI shell.
# Routes: brand-*.webwaka.ng/* and custom domains (CNAME via Cloudflare for SaaS)

name = "webwaka-brand-runtime"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# D1 — tenant + entity lookups
[[d1_databases]]
binding = "DB"
database_name = "webwaka-main"
database_id = "local-dev-placeholder"

# KV — theme token cache (TTL 300 s)
[[kv_namespaces]]
binding = "THEME_CACHE"
id = "local-dev-placeholder"

# ---------------------------------------------------------------------------
# Staging
# ---------------------------------------------------------------------------
[env.staging]
name = "webwaka-brand-runtime-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-os-staging"
database_id = "7c264f00-c36d-4014-b2fe-c43e136e86f6"

[[env.staging.kv_namespaces]]
binding = "THEME_CACHE"
id = "3093422f3e4e4252a3b542ed9a06fd18"

# ---------------------------------------------------------------------------
# Production
# ---------------------------------------------------------------------------
[env.production]
name = "webwaka-brand-runtime-production"

[env.production.vars]
ENVIRONMENT = "production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-os-production"
database_id = "72fa5ec8-52c2-4f41-b486-957d7b00c76f"

[[env.production.kv_namespaces]]
binding = "THEME_CACHE"
id = "d89a05e8c5814c6c966061f62dd24f8c"

# Secrets (set via: wrangler secret put SECRET_NAME)
# Required:
#   JWT_SECRET
#   LOG_PII_SALT
#   INTER_SERVICE_SECRET
