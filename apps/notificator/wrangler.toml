# apps/notificator/wrangler.toml
# WebWaka Notification Engine — Dedicated Cloudflare Worker
# OQ-001 resolution: This Worker owns all CF Queue consumption and digest CRON sweeps.
# See: docs/webwaka-notification-engine-final-master-specification-v2.md §8.0
#
# N-008 (Phase 0): Initial scaffold. Queue bindings require provisioning:
#   wrangler queues create webwaka-notification-queue-staging
#   wrangler queues create webwaka-notification-queue-production
# N-012 (Phase 1): Queue consumer implementation wired to consumer.ts
# N-012a (Phase 1): CRON digest sweep wired to digest.ts

name = "webwaka-notificator"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[vars]
ENVIRONMENT = "development"
# Kill-switches (set in all environments)
NOTIFICATION_PIPELINE_ENABLED = "0"
NOTIFICATION_SANDBOX_MODE = "true"

# D1 — shared database (same instance as apps/api)
[[d1_databases]]
binding = "DB"
database_name = "webwaka-main"
database_id = "local-dev-placeholder"

# ---------------------------------------------------------------------------
# Staging environment
# ---------------------------------------------------------------------------
[env.staging]
name = "webwaka-notificator-staging"
workers_dev = false

[env.staging.vars]
ENVIRONMENT = "staging"
# G24 (OQ-012): NOTIFICATION_SANDBOX_MODE must be "true" in staging.
# Any delivery in staging is redirected to NOTIFICATION_SANDBOX_EMAIL/PHONE/PUSH_TOKEN.
# CI/CD governance check asserts this before every staging deploy.
NOTIFICATION_SANDBOX_MODE = "true"
# Production rollout Phase 0 (Day 1-3): pipeline enabled in staging for validation.
# Set to "0" to disable (emergency kill-switch). See docs/ops/runbooks/production-rollout.md
NOTIFICATION_PIPELINE_ENABLED = "1"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-os-staging"
database_id = "52719457-5d5b-4f36-9a13-c90195ec78d2"

# Notification KV namespace — for preference cache, credential refs, unread counts
# Provision: wrangler kv namespace create NOTIFICATION_KV --env staging
# Then replace the placeholder id below.
[[env.staging.kv_namespaces]]
binding = "NOTIFICATION_KV"
id = "84c7fa6fdf564529825b5aeb22c7d765"

# Queue consumer binding (N-007 / N-008)
# Must match the queue name created for apps/api producer binding.
[[env.staging.queues.consumers]]
queue = "webwaka-notification-queue-staging"
max_batch_size = 100
max_batch_timeout = 5
max_retries = 5

[[env.staging.routes]]
pattern = "notificator-staging.webwaka.com"
zone_name = "webwaka.com"
custom_domain = true

# CRON triggers (N-012a — OQ-007 digest sweep)
# Times in UTC; WAT = UTC+1, so "00:00 WAT" = "23:00 UTC previous day"
[env.staging.triggers]
# CF account plan: 5 cron slots account-wide. 3 used by api+projections workers.
# 2 slots available for notificator.
# resolveDigestType() detects daily (hour=23) and weekly (hour=23+Sunday) at runtime
# on the single hourly cron, eliminating the need for separate '0 23 * * *' entries.
# Domain verification (N-053b) folded into retention cron (both run at 03:00 WAT daily).
crons = [
  "0 * * * *",     # Hourly digest; daily at hour=23; weekly at hour=23 on Sundays
  "0 2 * * *",     # 03:00 WAT: data retention (N-115) + domain verification (N-053b)
]

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------
[env.production]
name = "webwaka-notificator-production"
workers_dev = false

[env.production.vars]
ENVIRONMENT = "production"
# G24 (OQ-012): NOTIFICATION_SANDBOX_MODE must be "false" in production.
# CI/CD governance check asserts this before every production deploy.
NOTIFICATION_SANDBOX_MODE = "false"
NOTIFICATION_PIPELINE_ENABLED = "0"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-os-production"
database_id = "72fa5ec8-52c2-4f41-b486-957d7b00c76f"

# Notification KV namespace
# Provision: wrangler kv namespace create NOTIFICATION_KV --env production
[[env.production.kv_namespaces]]
binding = "NOTIFICATION_KV"
id = "0916f78f0853426fa87dba38da41d560"

# Queue consumer binding (N-007 / N-008)
[[env.production.queues.consumers]]
queue = "webwaka-notification-queue-production"
max_batch_size = 100
max_batch_timeout = 5
max_retries = 5

[[env.production.routes]]
pattern = "notificator.webwaka.com"
zone_name = "webwaka.com"
custom_domain = true

# CRON triggers
[env.production.triggers]
# Same 2-cron consolidation as staging (see staging comment above)
crons = [
  "0 * * * *",
  "0 2 * * *",
]

# ---------------------------------------------------------------------------
# Secrets (set via: wrangler secret put SECRET_NAME --env <environment>)
# ---------------------------------------------------------------------------
# Required for sandbox mode (G24 — OQ-012):
#   NOTIFICATION_SANDBOX_EMAIL   — staging test email address
#   NOTIFICATION_SANDBOX_PHONE   — staging test phone number (E.164)
#   NOTIFICATION_SANDBOX_PUSH_TOKEN — staging test FCM token
# Required for credential encryption (G16 — ADL-002):
#   NOTIFICATION_KV_MASTER_KEY   — AES-256-GCM master key for credential encryption
# Required for inter-service:
#   INTER_SERVICE_SECRET
