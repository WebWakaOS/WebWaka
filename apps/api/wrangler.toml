name = "webwaka-api"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# ── Staging environment ───────────────────────────────────────────────────────
[env.staging]
name = "webwaka-api-staging"
workers_dev = false

# Negotiation expiry CRON — runs every 15 minutes
[env.staging.triggers]
crons = ["*/15 * * * *"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-staging"
database_id = "52719457-5d5b-4f36-9a13-c90195ec78d2"
migrations_dir = "migrations"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "2a81cd5b8d094911a20e1e0f6a190506"

[[env.staging.kv_namespaces]]
binding = "GEOGRAPHY_CACHE"
id = "4732f3a682964607bae2170f350e4fb4"

# R2 — file/asset storage (logos, uploads, documents)
# Bucket name must match the provisioned bucket in Cloudflare (see infra/cloudflare/environments.md)
[[env.staging.r2_buckets]]
binding = "ASSETS"
bucket_name = "webwaka-os-assets-staging"

# KV (audit-log fallback, feature flags) — optional binding
# Provision: wrangler kv namespace create AUDIT_KV --env staging
# Then add the returned ID here and uncomment:
# [[env.staging.kv_namespaces]]
# binding = "KV"
# id = "<AUDIT_KV_STAGING_ID>"

# ── HandyLife Wallet feature flags + KYC limits KV (WF-012) ──────────────────
# Provision: wrangler kv namespace create WALLET_KV --env staging
# Then add the returned ID here and uncomment:
# [[env.staging.kv_namespaces]]
# binding = "WALLET_KV"
# id = "<WALLET_KV_STAGING_ID>"

# ── Notification Queue — PRODUCER binding (N-007 — Phase 0) ──────────────────
# Queue must be provisioned first:
#   wrangler queues create webwaka-notification-queue-staging
# Consumer is in apps/notificator (N-008).
[[env.staging.queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "webwaka-notification-queue-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
LOG_LEVEL = "debug"

[[env.staging.routes]]
pattern = "api-staging.webwaka.com"
zone_name = "webwaka.com"
custom_domain = true

# ── Production environment ────────────────────────────────────────────────────
[env.production]
name = "webwaka-api-production"
workers_dev = false

# Negotiation expiry CRON — runs every 15 minutes
[env.production.triggers]
crons = ["*/15 * * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-production"
database_id = "72fa5ec8-52c2-4f41-b486-957d7b00c76f"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "8cbf31285b0c43e1a8f44ee0af9fcdf3"

[[env.production.kv_namespaces]]
binding = "GEOGRAPHY_CACHE"
id = "5bd5695d963247d0b105a936827e0a89"

# R2 — file/asset storage (logos, uploads, documents)
[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "webwaka-os-assets-production"

# KV (audit-log fallback, feature flags) — optional binding
# Provision: wrangler kv namespace create AUDIT_KV --env production
# Then add the returned ID here and uncomment:
# [[env.production.kv_namespaces]]
# binding = "KV"
# id = "<AUDIT_KV_PRODUCTION_ID>"

# ── HandyLife Wallet feature flags + KYC limits KV (WF-012) ──────────────────
# Provision: wrangler kv namespace create WALLET_KV --env production
# Then add the returned ID here and uncomment:
# [[env.production.kv_namespaces]]
# binding = "WALLET_KV"
# id = "<WALLET_KV_PRODUCTION_ID>"

# ── Notification Queue — PRODUCER binding (N-007 — Phase 0) ──────────────────
# Queue must be provisioned first:
#   wrangler queues create webwaka-notification-queue-production
# Consumer is in apps/notificator (N-008).
[[env.production.queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "webwaka-notification-queue-production"

[env.production.vars]
ENVIRONMENT = "production"
LOG_LEVEL = "warn"

[[env.production.routes]]
pattern = "api.webwaka.com"
zone_name = "webwaka.com"
custom_domain = true

# ── Secrets (set via wrangler secret put, never in this file) ─────────────────
# Required:
#   JWT_SECRET
#   INTER_SERVICE_SECRET
#   PAYSTACK_SECRET_KEY
#   PREMBLY_API_KEY
#   TERMII_API_KEY
#   WHATSAPP_ACCESS_TOKEN
#   WHATSAPP_PHONE_NUMBER_ID
#   TELEGRAM_BOT_TOKEN
#   LOG_PII_SALT
#   DM_MASTER_KEY
#   PRICE_LOCK_SECRET
