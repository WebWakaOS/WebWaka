name = "webwaka-api"
main = "src/index.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

# Pending migrations (apply before next deploy):
# wrangler d1 migrations apply webwaka-main --remote
# 0008_init_search_index.sql    — search_entries table + search_fts FTS5 virtual table
# 0009_init_discovery_events.sql — discovery_events audit log table

[vars]
ENVIRONMENT = "development"

# D1 bindings — provisioned per environment
[[d1_databases]]
binding = "DB"
database_name = "webwaka-main"
database_id = "placeholder-replace-with-actual-id"

# KV bindings
[[kv_namespaces]]
binding = "GEOGRAPHY_CACHE"
id = "placeholder-replace-with-actual-id"

[env.staging]
name = "webwaka-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"

[env.production]
name = "webwaka-api-production"
[env.production.vars]
ENVIRONMENT = "production"
